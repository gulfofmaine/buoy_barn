services:
  db-test:
    image: postgis/postgis:15-3.3@sha256:a2fc46b52819d25add4ed93d3da83e106e17ea3ace6883cce3791631c9820bb2
    env_file:
      - ./docker-data/test.env

  cache-test:
    image: redis:7.4.7-alpine@sha256:ee64a64eaab618d88051c3ade8f6352d11531fcf79d9a4818b9b183d8c1d18ba

  web-test:
    build: ./app
    image: gmri/neracoos-buoy-barn
    volumes:
      - ./app:/app:cached
      - /app/.venv
    env_file:
      - ./docker-data/test.env
    links:
      - db-test
      - cache-test
