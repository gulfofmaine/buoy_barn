services:
  db-test:
    image: postgis/postgis:15-3.3@sha256:a2fc46b52819d25add4ed93d3da83e106e17ea3ace6883cce3791631c9820bb2
    env_file:
      - ./docker-data/test.env

  cache-test:
    image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99

  web-test:
    build: ./app
    image: gmri/neracoos-buoy-barn
    volumes:
      - ./app:/app:cached
      - /app/.venv
    env_file:
      - ./docker-data/test.env
    links:
      - db-test
      - cache-test
