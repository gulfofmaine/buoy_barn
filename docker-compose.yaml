services:
  db:
    extends:
      file: docker-compose.base.yaml
      service: db
    restart: always
    env_file:
      - ./docker-data/secret.env
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data

  cache:
    extends:
      file: docker-compose.base.yaml
      service: cache
    restart: always

  web:
    extends:
      file: docker-compose.base.yaml
      service: app
    command: uv run manage.py runserver 0:8090
    # command: "uv run granian --interface asgi --host 0.0.0.0 --port 8090 --workers 4 buoy_barn.asgi:application"
    restart: always
    volumes:
      - ./app:/app:cached
      - /app/.venv
      - ./docker-data/django-static:/static:cached
    # develop:
    #   watch:
    #     - action: sync
    #       path: ./app
    #       target: /app
    #       ignore:
    #         - ./app/.venv
    #     - action: rebuild
    #       path: ./app/pyproject.toml
    ports:
      - "8090:8090"
    environment:
      DJANGO_MANAGEPY_COLLECTSTATIC: "on"
      SENTRY_TRACES_SAMPLE_RATE: 0
    env_file:
      - ./docker-data/secret.env
    depends_on:
      - db
      - cache

  mqtt:
    extends:
      file: docker-compose.base.yaml
      service: app
    command: uv run manage.py erddap_mqtt NERACOOS_SEA_EAGLE
    volumes:
      - ./app:/app:cached
      - /app/.venv
      - ./docker-data/django-static:/static:cached
    environment:
      SENTRY_TRACES_SAMPLE_RATE: 0
    env_file:
      - ./docker-data/secret.env
    depends_on:
      - db
      - cache
    networks:
      - default
      - erddap_mqtt_network

  celery-worker:
    extends:
      file: docker-compose.base.yaml
      service: app
    command: celery -A buoy_barn worker -l info
    restart: always
    env_file:
      - ./docker-data/secret.env
    depends_on:
      - db
      - cache

  celery-beat:
    extends:
      file: docker-compose.base.yaml
      service: app
    command: celery -A buoy_barn beat -l info
    restart: always
    env_file:
      - ./docker-data/secret.env
    depends_on:
      - db
      - cache

  celery-flower:
    extends:
      file: docker-compose.base.yaml
      service: app
    command: celery -A buoy_barn flower -l info
    restart: always
    env_file:
      - ./docker-data/secret.env
    depends_on:
      - db
      - cache
    ports:
      - "5555:5555"

  spotlight:
    image: ghcr.io/getsentry/spotlight:latest
    ports:
      - "8969:8969/tcp"


networks:
  default:
    name: buoy_barn_network
    driver: bridge
  erddap_mqtt_network:
    name: erddap_mqtt_network
    external: true
